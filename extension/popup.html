<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MythX</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 380px;
    min-height: 480px;
    background: #070709;
    color: #f0eee8;
    font-family: 'Syne', sans-serif;
    overflow: hidden;
  }

  .bg-glow {
    position: fixed;
    top: -50px; left: -50px;
    width: 200px; height: 200px;
    background: radial-gradient(ellipse, rgba(200,255,0,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.2rem;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    position: relative;
    z-index: 1;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .logo-icon {
    width: 26px; height: 26px;
    background: #c8ff00;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
  }

  .logo span { color: #c8ff00; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #00C896;
    box-shadow: 0 0 6px #00C896;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  .body { padding: 1rem 1.2rem; position: relative; z-index: 1; }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    color: #6b6870;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 0.6rem;
  }

  textarea {
    width: 100%;
    background: #0f0f12;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    color: #f0eee8;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    padding: 0.75rem;
    resize: none;
    height: 90px;
    outline: none;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: rgba(200,255,0,0.3); }
  textarea::placeholder { color: #6b6870; }

  .upload-zone {
    background: #0f0f12;
    border: 1.5px dashed rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 1rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    margin-top: 0.6rem;
  }

  .upload-zone:hover { border-color: rgba(200,255,0,0.3); }
  .upload-zone input { position: absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .upload-zone p { font-size: 0.72rem; color: #6b6870; }

  #preview-img {
    display: none;
    width: 100%;
    max-height: 100px;
    object-fit: cover;
    border-radius: 8px;
    margin-top: 0.5rem;
  }

  .analyze-btn {
    width: 100%;
    margin-top: 0.8rem;
    background: #c8ff00;
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 0.75rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .analyze-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(200,255,0,0.3); }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .auto-detect-btn {
    width: 100%;
    margin-top: 0.5rem;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: #6b6870;
    padding: 0.6rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .auto-detect-btn:hover { border-color: rgba(200,255,0,0.3); color: #c8ff00; }

  /* Result */
  .result-panel {
    display: none;
    margin-top: 0.8rem;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .result-top {
    padding: 1rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .result-icon { font-size: 1.5rem; }

  .result-verdict {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .result-conf {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: #6b6870;
    margin-top: 0.15rem;
  }

  .result-body {
    padding: 0 1rem 1rem;
    font-size: 0.77rem;
    line-height: 1.55;
    color: #f0eee8;
    opacity: 0.8;
    border-top: 1px solid rgba(255,255,255,0.05);
    padding-top: 0.8rem;
  }

  .flags {
    margin-top: 0.6rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .flag-item {
    font-size: 0.7rem;
    color: #FF8C00;
    display: flex;
    gap: 0.3rem;
    align-items: flex-start;
    line-height: 1.35;
  }

  .flag-item::before { content: '⚠'; flex-shrink:0; }

  /* Settings */
  .settings-panel {
    margin-top: 0.8rem;
    padding: 0.8rem;
    background: rgba(200,255,0,0.04);
    border: 1px solid rgba(200,255,0,0.12);
    border-radius: 10px;
  }

  .settings-panel input {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(200,255,0,0.15);
    border-radius: 7px;
    color: #f0eee8;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    padding: 0.5rem 0.8rem;
    outline: none;
    margin-top: 0.4rem;
  }

  .save-btn {
    margin-top: 0.5rem;
    background: #c8ff00;
    color: #000;
    border: none;
    border-radius: 7px;
    padding: 0.45rem 1rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
  }

  .settings-link {
    display: block;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    color: #6b6870;
    margin-top: 0.5rem;
    cursor: pointer;
    text-decoration: none;
  }

  .settings-link:hover { color: #c8ff00; }

  .loading-bar {
    height: 2px;
    background: linear-gradient(90deg, #c8ff00, #00C896);
    border-radius: 1px;
    display: none;
    animation: loading 1.5s ease-in-out infinite;
    background-size: 200% 100%;
  }

  @keyframes loading {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.05);
    margin: 0.8rem 0;
  }
</style>
</head>
<body>
<div class="bg-glow"></div>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    Myth<span>X</span>
  </div>
  <div class="status-dot" id="status-dot"></div>
</header>

<div class="loading-bar" id="loading-bar"></div>

<div class="body">
  <!-- API Key check -->
  <div id="key-setup" style="display:none;">
    <div class="settings-panel">
      <div class="section-label">🔑 Setup Required</div>
      <p style="font-size:0.72rem;color:#6b6870;line-height:1.5;margin-bottom:0.3rem;">Get your FREE Gemini API key at <a href="https://aistudio.google.com" target="_blank" style="color:#c8ff00;">aistudio.google.com</a></p>
      <input type="text" id="key-input-setup" placeholder="Paste your free API key...">
      <button class="save-btn" onclick="saveApiKey()">Save & Start Detecting →</button>
    </div>
  </div>

  <div id="main-ui">
    <div class="section-label">Paste Content</div>
    <textarea id="post-text" placeholder="Paste tweet, headline, claim, or news text..."></textarea>

    <div class="upload-zone">
      <input type="file" id="img-upload" accept="image/*" onchange="handleImg(this)">
      <p>📎 Drop image or meme to analyze</p>
    </div>
    <img id="preview-img" alt="preview">

    <button class="analyze-btn" id="analyze-btn" onclick="runAnalysis()">⚡ Detect Fake News</button>
    <button class="auto-detect-btn" onclick="autoDetect()">🔍 Grab from Page</button>

    <div class="result-panel" id="result-panel">
      <div class="result-top" id="result-top">
        <div class="result-icon" id="result-icon">🔍</div>
        <div>
          <div class="result-verdict" id="result-verdict">—</div>
          <div class="result-conf" id="result-conf">Confidence: —</div>
        </div>
      </div>
      <div class="result-body" id="result-body">
        <div id="result-explanation"></div>
        <div class="flags" id="result-flags"></div>
      </div>
    </div>

    <div class="divider"></div>
    <a class="settings-link" onclick="toggleSettings()">⚙ API Key Settings</a>

    <div class="settings-panel" id="settings-panel" style="display:none;">
      <div class="section-label">Gemini API Key</div>
      <input type="text" id="key-input" placeholder="AIza...">
      <button class="save-btn" onclick="saveApiKey()">Save Key</button>
    </div>
  </div>
</div>

<script>
let imgBase64 = null;

chrome.storage.local.get(['gemini_key'], (result) => {
  if (!result.gemini_key) {
    document.getElementById('key-setup').style.display = 'block';
    document.getElementById('main-ui').style.display = 'none';
  } else {
    document.getElementById('key-input').value = result.gemini_key;
    document.getElementById('status-dot').style.background = '#c8ff00';
    document.getElementById('status-dot').style.boxShadow = '0 0 6px #c8ff00';
  }
});

function saveApiKey() {
  const key = (document.getElementById('key-input-setup') || document.getElementById('key-input')).value.trim()
    || document.getElementById('key-input').value.trim();
  
  const k1 = document.getElementById('key-input-setup').value.trim();
  const k2 = document.getElementById('key-input').value.trim();
  const finalKey = k1 || k2;
  
  if (!finalKey) return;
  chrome.storage.local.set({ gemini_key: finalKey }, () => {
    document.getElementById('key-setup').style.display = 'none';
    document.getElementById('main-ui').style.display = 'block';
    document.getElementById('key-input').value = finalKey;
    document.getElementById('status-dot').style.background = '#c8ff00';
    document.getElementById('status-dot').style.boxShadow = '0 0 6px #c8ff00';
  });
}

function handleImg(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    imgBase64 = e.target.result.split(',')[1];
    document.getElementById('preview-img').src = e.target.result;
    document.getElementById('preview-img').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function toggleSettings() {
  const p = document.getElementById('settings-panel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

async function runAnalysis() {
  const text = document.getElementById('post-text').value.trim();
  if (!text && !imgBase64) { alert('Add text or image to analyze'); return; }

  chrome.storage.local.get(['gemini_key'], async (result) => {
    if (!result.gemini_key) { alert('Set your API key first'); return; }
    setLoading(true);
    try {
      const analysis = await callGemini(text, imgBase64, result.gemini_key);
      showResult(analysis);
    } catch (e) {
      alert('Error: ' + e.message);
    }
    setLoading(false);
  });
}

async function autoDetect() {
  chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
    chrome.scripting.executeScript({
      target: { tabId: tabs[0].id },
      func: () => {
        // Try to grab selected text or main post content
        const sel = window.getSelection().toString().trim();
        if (sel) return sel;
        
        // Platform-specific selectors
        const selectors = [
          '[data-testid="tweetText"]',
          '.tweet-text',
          '[class*="userContent"]',
          '.post-content',
          'article p',
          'main p'
        ];
        
        for (const s of selectors) {
          const el = document.querySelector(s);
          if (el && el.innerText.trim()) return el.innerText.trim().slice(0, 1000);
        }
        return null;
      }
    }, (results) => {
      if (results && results[0] && results[0].result) {
        document.getElementById('post-text').value = results[0].result;
      } else {
        alert('Could not auto-detect. Please paste content manually.');
      }
    });
  });
}

async function callGemini(text, imageBase64, apiKey) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

  const parts = [];
  const prompt = `You are MythX fact-checker. Analyze for fake news/misinformation. Respond ONLY with JSON:
{"verdict":"REAL"|"FAKE"|"MISLEADING"|"UNVERIFIED","confidence":<0-100>,"explanation":"<2 sentences>","red_flags":["..."],"credibility_score":<0-100>}`;

  parts.push({ text: prompt });
  if (text) parts.push({ text: 'CONTENT: ' + text });
  if (imageBase64) parts.push({ inline_data: { mime_type: 'image/jpeg', data: imageBase64 } });

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: [{ parts }], generationConfig: { temperature: 0.1, maxOutputTokens: 512 } })
  });

  if (!res.ok) throw new Error('API Error: ' + res.status);
  const data = await res.json();
  const rawText = data.candidates[0].content.parts[0].text;
  const match = rawText.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('Parse error');
  return JSON.parse(match[0]);
}

function showResult(r) {
  const icons = { REAL: '✅', FAKE: '🚫', MISLEADING: '⚠️', UNVERIFIED: '🔍' };
  const colors = { REAL: '#00C896', FAKE: '#FF3B5C', MISLEADING: '#FF8C00', UNVERIFIED: '#A78BFA' };
  const color = colors[r.verdict] || '#A78BFA';

  document.getElementById('result-icon').textContent = icons[r.verdict] || '🔍';
  document.getElementById('result-verdict').textContent = r.verdict;
  document.getElementById('result-verdict').style.color = color;
  document.getElementById('result-conf').textContent = `Confidence: ${r.confidence}% | Score: ${r.credibility_score}/100`;
  document.getElementById('result-explanation').textContent = r.explanation || '';
  document.getElementById('result-top').style.background = color + '15';

  const flags = document.getElementById('result-flags');
  flags.innerHTML = (r.red_flags || []).map(f => `<div class="flag-item">${f}</div>`).join('');

  document.getElementById('result-panel').style.display = 'block';

  // Update stats
  chrome.storage.local.get(['mythx_stats'], (res) => {
    const stats = res.mythx_stats || { total: 0, fake: 0 };
    stats.total++;
    if (r.verdict === 'FAKE' || r.verdict === 'MISLEADING') stats.fake++;
    chrome.storage.local.set({ mythx_stats: stats });
  });
}

function setLoading(show) {
  const btn = document.getElementById('analyze-btn');
  const bar = document.getElementById('loading-bar');
  btn.disabled = show;
  btn.textContent = show ? 'Analyzing...' : '⚡ Detect Fake News';
  bar.style.display = show ? 'block' : 'none';
}
</script>
</body>
</html>
